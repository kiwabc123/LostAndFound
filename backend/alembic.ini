# Alembic ini file for database migrations
# This file is read by Alembic and used to configure database connections.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[alembic]
# path to migration scripts
script_location = .

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to datetime.datetime.now().astimezone()
#
# leave empty for localtime
# timezone =

# max length of characters to apply to the
# "slug" field
# set to 0 to disable, otherwise, it's the max
# wingspan of the migration name
# ex: max_identifier_length = 40

# the output encoding used when revision files
# are written from script.py.mako
# string value is passed to the `encoding` parameter
# of the `file.write()` method
# defaults to 'utf-8'
# output_encoding = utf-8

sqlalchemy.url = driver://user:password@localhost/dbname

[migration:markers]
# This section defines tokens that can be inserted into migration
# files as a way to capture differences between template definitions.
